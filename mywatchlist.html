<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watch List</title>
    <link rel="stylesheet" href="index1.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="title">
            <h1>My Watchlist</h1>
        </div>
        <div class="search-movie-btn">
            <a href="search.html" target="">
                <button>Search for Movies</button>
            </a>
        </div>
    </header>
    
    <!-- MAIN CONTENT -->
    <main class="container">
        <!-- WATCH LIST -->
        <section class="watchlist-section">
            <h2>My Watch List</h2>
            <div id="watchlist" class="watchlist-grid">
                <!-- Saved movies will appear here -->
            </div>
        </section>
        
        <!-- NO MOVIE RESULTS -->
        <section id="emptyState" class="hidden">
            <h3 class="empty">No movies to display</h3>
        </section>
    </main>
    
    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; Created by Fakhar Alam | Powered by <a href="https://www.omdbapi.com">OMDb API</a></p>
    </footer>

    <script src="script1.js" type="module"></script>
</body>
</html>
