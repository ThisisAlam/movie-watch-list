<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watch List</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="title">
            <h1>🎬 Find Your Favorite Movie</h1>
            <p>Search movies and build your personal watch list</p>
        </div>
        <div class="watchlist-btn">
            <a href="mywatchlist.html" target="">
                <button>My Watchlist</button>
            </a>
        </div>
    </header>
    <!-- <hr/> -->
    
    <!-- MAIN CONTENT -->
    <main class="container">
        
        <!-- SEARCH SECTION -->
        <section class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search for a movie..."/>
            <button id="searchBtn">Search</button>
        </section>
        <!-- <hr/> -->
        
        <!-- MOVIE RESULTS -->
        <section class="movies-section">
            <h2>Search Results</h2>
            <div id="movies" class="movies-grid">
                <!-- Movies will be injected here -->
            </div>
        </section>

        <!-- NO MOVIE RESULTS
        <section id="emptyState" class="hidden">
            <h3 class="empty">No movies to display</h3>
        </section> -->

        <!-- NO MOVIE RESULTS -->
        <section id="emptyState" class="hidden">
            <h3 class="empty">No movies to display</h3>
        </section>
    </main>
    
    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; Created by Fakhar Alam | Powered by <a href="https://www.omdbapi.com">OMDb API</a></p>
    </footer>

    <script src="index.js" type="module"></script>
</body>
</html>
